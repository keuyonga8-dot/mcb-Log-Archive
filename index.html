<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>로그 보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@300;400;500;700&family=Nanum+Myeongjo:wght@400;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#faf8f4; --surface:#fffefb; --border:#e8dfd0; --border2:#d4c8b5;
  --text:#2d2416; --text2:#7a6a54; --text3:#b0a090;
  --accent:#c8843a; --accent-soft:#f5e8d8; --accent2:#8a6d4a;
  --nav-w:200px; --radius:10px; --shadow:0 2px 12px rgba(60,40,10,.07);
  --content-max:860px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
body{display:flex;flex-direction:column;overflow:hidden;}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;min-height:0;}

/* ── NAV ── */
.nav{width:var(--nav-w);background:var(--surface);border-right:1px solid var(--border);padding:16px 0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.nav-logo{padding:10px 16px 16px;font-family:'Noto Serif KR',serif;font-size:14px;font-weight:500;color:var(--accent2);border-bottom:1px solid var(--border);margin-bottom:12px;}
.nav-section{padding:0 12px;margin-bottom:16px;}
.nav-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;padding:0 4px;}
.nav-btn{display:flex;align-items:center;gap:7px;width:100%;padding:7px 10px;border:none;background:none;border-radius:7px;color:var(--text2);font-size:12px;cursor:pointer;text-align:left;transition:all .15s;margin-bottom:1px;font-family:inherit;}
.nav-btn:hover{background:var(--accent-soft);color:var(--accent);}
.nav-btn.active{background:var(--accent-soft);color:var(--accent);font-weight:600;}
.nav-icon{font-size:14px;width:16px;text-align:center;flex-shrink:0;}
.nav-divider{margin:6px 12px;border:none;border-top:1px solid var(--border);}
.nav-new-btn{margin:0 12px 4px;padding:8px 12px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;width:calc(100% - 24px);transition:all .15s;font-family:inherit;}
.nav-new-btn:hover{background:#b5742e;}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:20px 24px;}
.main-inner{max-width:var(--content-max);margin:0 auto;}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.main-title{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:500;color:var(--text);}
.action-btn{padding:6px 14px;border:1px solid var(--border);background:var(--surface);border-radius:6px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap;}
.action-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
.action-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.action-btn.primary:hover{background:#b5742e;}
.action-btn.danger{color:#c04040;border-color:#f0c0c0;}
.action-btn.danger:hover{background:#fff5f5;border-color:#e08080;}

/* ── 게시판 ── */
.board-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border);table-layout:fixed;}
.board-table col.c-num{width:40px;}
.board-table col.c-title{width:auto;}
.board-table col.c-date{width:90px;}
.board-table col.c-act{width:100px;}
.board-table thead tr{background:var(--bg);border-bottom:1px solid var(--border2);}
.board-table th{padding:9px 14px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;text-align:left;}
.board-table th:first-child{text-align:center;}
.board-row{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.board-row:last-child{border-bottom:none;}
.board-row:hover{background:var(--accent-soft);}
.board-row td{padding:12px 14px;vertical-align:middle;}
.b-num{text-align:center;font-size:11px;color:var(--text3);}
.b-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:7px;}
.b-title-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;}
.b-star{color:var(--accent);font-size:11px;flex-shrink:0;}
.b-date{font-size:11px;color:var(--text3);white-space:nowrap;}
.b-acts{display:flex;gap:4px;justify-content:flex-end;}
.b-btn{padding:3px 9px;border:1px solid var(--border);background:none;border-radius:4px;font-size:10px;color:var(--text3);cursor:pointer;transition:all .13s;font-family:inherit;white-space:nowrap;}
.b-btn:hover{color:var(--text2);border-color:var(--border2);}
.b-btn.del:hover{color:#c04040;border-color:#e08080;background:#fff5f5;}

/* ── 상세 뷰 ── */
.detail-back{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;margin-bottom:16px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);transition:all .13s;}
.detail-back:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);gap:12px;}
.detail-title{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:500;color:var(--text);line-height:1.3;}
.detail-meta{font-size:11px;color:var(--text3);margin-top:4px;}
.detail-acts{display:flex;gap:6px;flex-shrink:0;align-items:flex-start;flex-wrap:wrap;justify-content:flex-end;}

/* ── 테마 배너 이미지 ── */
.theme-banner{width:100%;border-radius:var(--radius);overflow:hidden;position:relative;background:#1a1a1a;margin-bottom:20px;user-select:none;}
.theme-banner-inner{width:100%;height:220px;overflow:hidden;cursor:grab;position:relative;}
.theme-banner-inner:active{cursor:grabbing;}
.theme-banner-inner img{position:absolute;width:100%;height:100%;object-fit:cover;transform-origin:center;transition:none;pointer-events:none;}
.theme-banner-ctrl{display:flex;align-items:center;gap:6px;padding:7px 10px;background:rgba(0,0,0,.32);position:absolute;bottom:0;right:0;border-radius:8px 0 0 0;}
.banner-ctrl-btn{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:5px;padding:3px 9px;font-size:11px;cursor:pointer;font-family:inherit;transition:background .13s;}
.banner-ctrl-btn:hover{background:rgba(255,255,255,.32);}

/* ── 턴 카드 ── */
.turn-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:14px;box-shadow:var(--shadow);}
.turn-save-row{display:flex;justify-content:flex-end;margin-bottom:8px;}
.turn-body{font-family:'Noto Serif KR',serif;font-size:13.5px;line-height:2.05;color:var(--text);white-space:pre-wrap;word-break:keep-all;}
.turn-body .starred{font-style:italic;color:#9a8a7a;}
.turn-body .quoted{color:#c8843a;}
.turn-body .starred-strong{font-weight:700;}
.turn-widget{margin-top:14px;padding-top:14px;border-top:1px dashed var(--border2);}
.turn-widget-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;}
.turn-img-block{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border2);}
.turn-img-block img{max-width:100%;border-radius:8px;display:block;}

/* ── 카드 비율 뷰 (상세 뷰 전용) ── */
/* 비율별 래퍼: 카드처럼 고정 비율로 표시 */
.ratio-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}

.save-img-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .13s;}
.save-img-btn:hover{background:#b5742e;}
.save-img-btn.outline{background:none;color:var(--accent);border:1px solid var(--accent);}
.save-img-btn.outline:hover{background:var(--accent-soft);}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(40,28,15,.38);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px);padding:16px;}
.modal-bg.show{display:flex;}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:760px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(40,20,5,.18);border:1px solid var(--border);}
.modal-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-hd h3{font-size:13px;font-weight:600;font-family:'Noto Serif KR',serif;color:var(--text);}
.modal-x{background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer;padding:0 2px;line-height:1;}
.modal-body{flex:1;overflow-y:auto;padding:18px;}
.modal-ft{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;}

/* ── 폼 ── */
.lw-row{margin-bottom:13px;}
.lw-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;display:block;}
.lw-input{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:7px;background:var(--bg);font-size:13px;color:var(--text);font-family:inherit;transition:border-color .13s;}
.lw-input:focus{outline:none;border-color:var(--accent);}

/* ── 테마 이미지 에디터 ── */
.theme-img-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.theme-img-preview{width:100%;height:100px;border-radius:8px;overflow:hidden;background:#f0ece6;border:1px solid var(--border);position:relative;display:none;}
.theme-img-preview img{width:100%;height:100%;object-fit:cover;}
.theme-img-remove{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ── 턴 에디터 ── */
.turn-editor{border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;}
.turn-editor-hd{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--bg);border-bottom:1px solid var(--border);}
.turn-editor-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;}
.turn-editor-del{background:none;border:none;font-size:14px;color:var(--text3);cursor:pointer;padding:0 2px;}
.turn-editor-del:hover{color:#c04040;}
.turn-editor-body{padding:11px;}
.lw-ta{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:7px;background:var(--bg);font-size:13px;font-family:'Noto Serif KR',serif;color:var(--text);resize:none;line-height:1.8;transition:border-color .13s;}
.lw-ta:focus{outline:none;border-color:var(--accent);}
.lw-ta.mono{font-family:monospace;font-size:11px;line-height:1.6;}
.add-turn-btn{width:100%;padding:8px;border:1px dashed var(--border2);background:none;border-radius:8px;font-size:12px;color:var(--text3);cursor:pointer;transition:all .13s;font-family:inherit;margin-bottom:10px;}
.add-turn-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
.img-up-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1px dashed var(--border2);background:none;border-radius:6px;font-size:11px;color:var(--text3);cursor:pointer;transition:all .13s;font-family:inherit;margin-top:5px;}
.img-up-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
.img-prev-wrap{position:relative;display:inline-block;margin-top:6px;}
.img-prev-wrap img{max-width:100%;max-height:180px;border-radius:7px;display:block;}
.img-rm-btn{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ── 이미지 배치 토글 ── */
.img-pos-row{display:flex;gap:6px;margin-top:6px;}
.img-pos-btn,.img-size-btn{flex:1;padding:5px;border:1px solid var(--border);background:var(--surface);border-radius:5px;font-size:10px;color:var(--text3);cursor:pointer;text-align:center;font-family:inherit;transition:all .13s;}
.img-pos-btn.active,.img-size-btn.active{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);font-weight:600;}

/* ── 에디터 iframe ── */
.editor-wrap{flex:1;overflow:hidden;min-height:580px;}
.editor-wrap iframe{width:100%;height:100%;min-height:580px;border:none;display:block;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2d2416;color:#fff;padding:9px 20px;border-radius:30px;font-size:12px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:70px 20px;color:var(--text3);}
.empty-state p{font-size:13px;margin-top:8px;}

/* ── 이미지 카드형 목록 ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.card-item{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;background:#1a1a1a;aspect-ratio:16/7;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;}
.card-item:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(60,40,10,.13);}
.card-item-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .3s;}
.card-item:hover .card-item-bg{transform:scale(1.03);}
.card-item-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.72) 0%,rgba(0,0,0,.1) 60%,transparent 100%);}
.card-item-info{position:absolute;bottom:0;left:0;right:0;padding:14px 16px;}
.card-item-title{font-family:'Noto Serif KR',serif;font-size:14px;font-weight:500;color:#fff;line-height:1.3;margin-bottom:4px;text-shadow:0 1px 4px rgba(0,0,0,.5);}
.card-item-date{font-size:10px;color:rgba(255,255,255,.65);}
.card-item-acts{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .15s;}
.card-item:hover .card-item-acts{opacity:1;}
.card-item-btn{background:rgba(0,0,0,.45);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:4px;font-size:10px;padding:2px 8px;cursor:pointer;backdrop-filter:blur(4px);font-family:inherit;}
.card-item-btn:hover{background:rgba(0,0,0,.7);}
/* 뷰 전환 버튼 */
.view-toggle{display:flex;gap:4px;}
.vt-btn{padding:5px 10px;border:1px solid var(--border);background:var(--surface);border-radius:5px;font-size:12px;color:var(--text3);cursor:pointer;transition:all .13s;font-family:inherit;}
.vt-btn.active{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── 창 크기 옵션 ── */
body.layout-fixed .main-inner{max-width:860px;}
body.layout-compact .main-inner{max-width:660px;}

/* ── 모바일 ── */
@media(max-width:680px){
  body{overflow:auto;}
  .layout{flex-direction:column;overflow:visible;}
  .nav{width:100%;flex-direction:row;flex-wrap:wrap;padding:8px 10px;gap:4px;border-right:none;border-bottom:1px solid var(--border);overflow:visible;}
  .nav-logo{display:none;}
  .nav-section{padding:0;margin-bottom:0;}
  .nav-label{display:none;}
  .nav-new-btn{margin:0;width:auto;padding:6px 12px;font-size:11px;}
  .nav-btn{padding:5px 9px;font-size:11px;border-radius:6px;}
  .nav-icon{display:none;}
  .nav-divider{display:none;}
  .main{overflow:visible;padding:14px 12px;}
  .modal-bg{padding:8px;align-items:flex-end;}
  .modal{max-height:95vh;border-radius:12px 12px 0 0;}
  .board-table col.c-date{width:72px;}
  .board-table col.c-act{width:80px;}
  .b-btn{padding:2px 7px;}
  .detail-header{flex-direction:column;gap:10px;}
  .detail-acts{width:100%;justify-content:flex-start;}
  .theme-banner-inner{height:160px;}
  .turn-card{padding:14px 14px;}
}
</style>
</head>
<body class="layout-fixed">

<div class="layout">
  <!-- NAV -->
  <nav class="nav">
    <div class="nav-logo">✦ 로그 보드</div>
    <div class="nav-section">
      <button class="nav-new-btn" onclick="openNewLog()">＋ 새 로그</button>
    </div>
    <div class="nav-section">
      <div class="nav-label">보기</div>
      <button class="nav-cat-btn nav-btn active" onclick="navFilter('',this)"><span class="nav-icon">📋</span>전체 로그</button>
      <button class="nav-cat-btn nav-btn" onclick="navFilter('starred',this)"><span class="nav-icon">⭐</span>즐겨찾기</button>
    </div>
    <div class="nav-section">
      <div class="nav-label" style="display:flex;align-items:center;justify-content:space-between;">
        분류
        <button onclick="openCatModal()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;" title="분류 관리">＋</button>
      </div>
      <div id="nav-cats"></div>
    </div>
    <hr class="nav-divider">
    <div class="nav-section">
      <div class="nav-label">창 크기</div>
      <button class="nav-btn" id="sz-fixed" onclick="setLayout('fixed',this)"><span class="nav-icon">▣</span>고정 폭</button>
      <button class="nav-btn" id="sz-compact" onclick="setLayout('compact',this)"><span class="nav-icon">▥</span>좁은 여백</button>
    </div>
    <hr class="nav-divider">
    <div class="nav-section">
      <div class="nav-label">백업</div>
      <button class="nav-btn" onclick="exportJSON()"><span class="nav-icon">💾</span>JSON 내보내기</button>
      <button class="nav-btn" onclick="exportHTML()"><span class="nav-icon">📄</span>HTML 내보내기</button>
      <button class="nav-btn" onclick="document.getElementById('import-file').click()"><span class="nav-icon">📂</span>불러오기</button>
      <input type="file" id="import-file" accept=".json" hidden onchange="importJSON(this)">
    </div>
    <hr class="nav-divider">
    <div class="nav-section">
      <div class="nav-label">도구</div>
      <button class="nav-btn" onclick="openEditorModal()"><span class="nav-icon">🖼️</span>카드 에디터</button>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="main-inner">

      <!-- 목록 뷰 -->
      <div id="view-list">
        <div class="main-header">
          <div class="main-title" id="main-title">전체 로그</div>
          <div style="display:flex;gap:8px;align-items:center;">
            <div class="view-toggle">
              <button class="vt-btn active" id="vt-board" onclick="setViewMode('board',this)" title="게시판형">☰</button>
              <button class="vt-btn" id="vt-card" onclick="setViewMode('card',this)" title="카드형">⊞</button>
            </div>
            <button class="action-btn primary" onclick="openNewLog()">＋ 새 로그</button>
          </div>
        </div>
        <div id="log-list"></div>
      </div>

      <!-- 상세 뷰 -->
      <div id="view-detail" style="display:none;">
        <div class="detail-back" onclick="showList()">← 목록으로</div>
        <div class="detail-header">
          <div style="flex:1;min-width:0;">
            <div class="detail-title" id="detail-title"></div>
            <div class="detail-meta" id="detail-meta"></div>
          </div>
          <div class="detail-acts">
            <button class="save-img-btn outline" onclick="saveAllImg()" style="font-size:11px;padding:5px 12px;">📷 저장</button>
            <button class="save-img-btn outline" onclick="saveAllImgWide()" style="font-size:11px;padding:5px 12px;" title="1080px 와이드 캡처">📷 와이드</button>
            <button class="action-btn" onclick="editCurrentLog()">수정</button>
            <button class="action-btn danger" onclick="deleteCurrentLog()">삭제</button>
          </div>
        </div>
        <div id="detail-banner" style="display:none;"></div>
        <div id="detail-turns"></div>
      </div>

<div class="toast" id="toast"></div>

<script>
/* ══ 데이터 ══ */
const STORE = 'logboard_v2';
const CAT_STORE = 'logboard_cats_v1';
let logs = [], filterMode = 'all', editingId = null, currentDetailId = null, editorInjected = false;
let themeImgData = '';
let currentCategory = ''; // '' = 전체, 'starred' = 즐겨찾기, else = 카테고리명
let viewMode = localStorage.getItem('lb_view') || 'board'; // 'board' | 'card'

function loadLogs(){ try{ logs=JSON.parse(localStorage.getItem(STORE)||'[]'); }catch(e){ logs=[]; } }
function saveLogs(){ localStorage.setItem(STORE, JSON.stringify(logs)); }
function loadCats(){ try{ const d=JSON.parse(localStorage.getItem(CAT_STORE)||'[]'); return d.map(x=>typeof x==='string'?{name:x,icon:'🏷️'}:x); }catch(e){ return []; } }
function saveCats(arr){ localStorage.setItem(CAT_STORE, JSON.stringify(arr)); }

/* ══ 창 크기 ══ */
function setLayout(mode, btn){
  document.body.className = 'layout-' + mode;
  document.querySelectorAll('[id^="sz-"]').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  localStorage.setItem('lb_layout', mode);
}
(function initLayout(){
  const m = localStorage.getItem('lb_layout') || 'fixed';
  document.body.className = 'layout-' + m;
  const b = document.getElementById('sz-' + m);
  if(b) b.classList.add('active');
})();

/* ══ 마크업 ══ */
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function parseMarkup(text){
  let s = escH(text);
  s = s.replace(/\*\*([^*\n]+?)\*\*/g,'<span class="starred-strong">$1</span>');
  s = s.replace(/\*([^*\n]+?)\*/g,'<span class="starred">$1</span>');
  s = s.replace(/&quot;([^&\n]*?)&quot;/g,'<span class="quoted">&quot;$1&quot;</span>');
  s = s.replace(/\u201C([^\u201D\n]*?)\u201D/g,'<span class="quoted">\u201C$1\u201D</span>');
  return s;
}

/* ══ 목록 ══ */
function getFiltered(){
  if(currentCategory === 'starred') return logs.filter(l=>l.starred);
  if(currentCategory === '') return logs;
  return logs.filter(l=>l.category === currentCategory);
}

function setViewMode(mode, btn){
  viewMode = mode;
  localStorage.setItem('lb_view', mode);
  document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderList();
}

function renderList(){
  const list = document.getElementById('log-list');
  const fil = getFiltered();
  if(!fil.length){
    list.innerHTML = `<div class="empty-state"><div style="font-size:34px;">📖</div><p>아직 기록이 없어요.<br>새 로그를 작성해보세요!</p></div>`;
    return;
  }
  if(viewMode === 'card') { renderCardView(list, fil); return; }
  renderBoardView(list, fil);
}

function renderBoardView(list, fil){
  const rows = fil.map((log,i) => {
    const d = log.id ? new Date(log.id) : null;
    const ds = d ? `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}` : '';
    const titleShow = log.title || ds;
    const star = log.starred ? '<span class="b-star">⭐</span>' : '';
    const catObj = log.category ? loadCats().find(c=>c.name===log.category) : null;
    const catBadge = log.category ? `<span style="font-size:9px;padding:1px 6px;background:var(--accent-soft);color:var(--accent2);border-radius:8px;border:1px solid var(--border);font-weight:600;">${catObj?catObj.icon:'🏷️'} ${escH(log.category)}</span>` : '';
    return `<tr class="board-row" onclick="showDetail(${log.id})">
      <td class="b-num">${fil.length-i}</td>
      <td><div class="b-title">${star}<span class="b-title-text">${escH(titleShow)}</span>${catBadge}</div></td>
      <td class="b-date">${ds}</td>
      <td><div class="b-acts">
        <button class="b-btn" onclick="event.stopPropagation();editLog(${log.id})">수정</button>
        <button class="b-btn del" onclick="event.stopPropagation();deleteLog(${log.id})">삭제</button>
      </div></td>
    </tr>`;
  }).join('');
  list.innerHTML = `<table class="board-table">
    <colgroup><col class="c-num"><col class="c-title"><col class="c-date"><col class="c-act"></colgroup>
    <thead><tr><th style="text-align:center">#</th><th>제목</th><th>날짜</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderCardView(list, fil){
  const cards = fil.map(log => {
    const d = log.id ? new Date(log.id) : null;
    const ds = d ? `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}` : '';
    const titleShow = log.title || ds;
    const star = log.starred ? '⭐ ' : '';
    // 배경: 테마이미지 → 첫 번째 블록 이미지 → 색상 그라디언트
    const firstImg = log.themeImg || (log.turns||[]).map(t=>t.img).find(Boolean) || '';
    const bgStyle = firstImg
      ? `background-image:url('${firstImg}');`
      : `background:linear-gradient(135deg,#2d2416,#7a6a54);`;
    return `<div class="card-item" onclick="showDetail(${log.id})">
      <div class="card-item-bg" style="${bgStyle}"></div>
      <div class="card-item-overlay"></div>
      <div class="card-item-acts">
        <button class="card-item-btn" onclick="event.stopPropagation();editLog(${log.id})">수정</button>
        <button class="card-item-btn" onclick="event.stopPropagation();deleteLog(${log.id})">삭제</button>
      </div>
      <div class="card-item-info">
        <div class="card-item-title">${star}${escH(titleShow)}</div>
        <div class="card-item-date">${ds}</div>
      </div>
    </div>`;
  }).join('');
  list.innerHTML = `<div class="card-grid">${cards}</div>`;
}

/* ══ 뷰 전환 ══ */
function showList(){
  document.getElementById('view-list').style.display = '';
  document.getElementById('view-detail').style.display = 'none';
  currentDetailId = null;
  document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active'));
  const vb = document.getElementById('vt-'+viewMode);
  if(vb) vb.classList.add('active');
  renderList();
}

function showDetail(id){
  const log = logs.find(l=>l.id===id); if(!log) return;
  currentDetailId = id;
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-detail').style.display = '';

  const d = log.id ? new Date(log.id) : null;
  const ts = d ? `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}` : '';
  document.getElementById('detail-title').textContent = log.title || ts;
  document.getElementById('detail-meta').textContent = (log.title ? ts + (log.starred ? ' · ⭐' : '') : (log.starred ? '⭐ 즐겨찾기' : ''));

  /* 테마 배너 */
  const bannerEl = document.getElementById('detail-banner');
  if(log.themeImg){
    bannerEl.style.display = '';
    bannerEl.innerHTML = renderBanner(log.themeImg);
    initBannerDrag(bannerEl.querySelector('.theme-banner-inner'));
  } else {
    bannerEl.style.display = 'none';
    bannerEl.innerHTML = '';
  }

  /* 턴 */
  const turns = log.turns || [];
  const turnsHtml = turns.map((turn,i) => {
    const bodyHtml = turn.body ? `<div class="turn-body">${parseMarkup(turn.body)}</div>` : '';
    const widgetHtml = turn.html && turn.html.trim()
      ? `<div class="turn-widget"><div class="turn-widget-label">📊 위젯</div><div>${turn.html}</div></div>` : '';
    const szMap = {small:'200px', medium:'50%', original:'100%'};
    const imgW = szMap[turn.imgSize||'original'] || '100%';
    const imgHtml = turn.img
      ? `<div class="turn-img-block"><img src="${turn.img}" alt="첨부 이미지" style="width:${imgW};max-width:100%;cursor:zoom-in;border-radius:7px;" onclick="zoomImg('${turn.img}')"></div>` : '';
    const imgTop = turn.imgPos === 'top';
    const saveBtn = `<div class="turn-save-row"><button class="save-img-btn outline" style="font-size:10px;padding:3px 10px;" onclick="saveTurnImg(${i})">📷 저장</button></div>`;
    const inner = [saveBtn, imgTop ? imgHtml : '', bodyHtml, widgetHtml, !imgTop ? imgHtml : ''].filter(Boolean).join('');
    if(![bodyHtml, widgetHtml, imgHtml].some(Boolean)) return '';
    return `<div class="turn-card" id="tc-${i}">${inner}</div>`;
  }).filter(Boolean).join('');

  document.getElementById('detail-turns').innerHTML = turnsHtml || '<div style="color:var(--text3);text-align:center;padding:40px;">내용이 없습니다.</div>';
}

/* ══ 배너 렌더 ══ */
function renderBanner(imgSrc, posX=50, posY=50, zoom=1){
  return `<div class="theme-banner">
    <div class="theme-banner-inner" data-posx="${posX}" data-posy="${posY}" data-zoom="${zoom}">
      <img src="${imgSrc}" style="object-position:${posX}% ${posY}%;transform:scale(${zoom});">
    </div>
    <div class="theme-banner-ctrl">
      <button class="banner-ctrl-btn" onclick="bannerZoom(this,-0.1)">－</button>
      <button class="banner-ctrl-btn" onclick="bannerZoom(this,0.1)">＋</button>
      <button class="banner-ctrl-btn" onclick="bannerReset(this)">리셋</button>
    </div>
  </div>`;
}

function bannerZoom(btn, delta){
  const inner = btn.closest('.theme-banner').querySelector('.theme-banner-inner');
  let z = parseFloat(inner.dataset.zoom||1) + delta;
  z = Math.max(1, Math.min(4, z));
  inner.dataset.zoom = z;
  inner.querySelector('img').style.transform = `scale(${z})`;
}
function bannerReset(btn){
  const inner = btn.closest('.theme-banner').querySelector('.theme-banner-inner');
  inner.dataset.zoom = 1; inner.dataset.posx = 50; inner.dataset.posy = 50;
  const img = inner.querySelector('img');
  img.style.transform = 'scale(1)';
  img.style.objectPosition = '50% 50%';
}

function initBannerDrag(inner){
  if(!inner) return;
  let drag = null;
  inner.addEventListener('mousedown', e=>{
    drag = {sx:e.clientX, sy:e.clientY, px:parseFloat(inner.dataset.posx||50), py:parseFloat(inner.dataset.posy||50)};
    inner.style.cursor='grabbing';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e=>{
    if(!drag) return;
    const z = parseFloat(inner.dataset.zoom||1);
    const w = inner.offsetWidth, h = inner.offsetHeight;
    // px 단위 이동을 % 로 변환, zoom 고려
    const dx = (e.clientX - drag.sx) / w * 100 / z;
    const dy = (e.clientY - drag.sy) / h * 100 / z;
    const nx = Math.max(0, Math.min(100, drag.px - dx));
    const ny = Math.max(0, Math.min(100, drag.py - dy));
    inner.dataset.posx = nx; inner.dataset.posy = ny;
    inner.querySelector('img').style.objectPosition = `${nx.toFixed(1)}% ${ny.toFixed(1)}%`;
  });
  document.addEventListener('mouseup', ()=>{ if(drag){ drag=null; inner.style.cursor='grab'; } });
  // touch
  inner.addEventListener('touchstart', e=>{
    const t=e.touches[0];
    drag={sx:t.clientX,sy:t.clientY,px:parseFloat(inner.dataset.posx||50),py:parseFloat(inner.dataset.posy||50)};
    e.preventDefault();
  },{passive:false});
  inner.addEventListener('touchmove', e=>{
    if(!drag) return; e.preventDefault();
    const t=e.touches[0];
    const z=parseFloat(inner.dataset.zoom||1),w=inner.offsetWidth,h=inner.offsetHeight;
    const dx=(t.clientX-drag.sx)/w*100/z,dy=(t.clientY-drag.sy)/h*100/z;
    const nx=Math.max(0,Math.min(100,drag.px-dx)),ny=Math.max(0,Math.min(100,drag.py-dy));
    inner.dataset.posx=nx;inner.dataset.posy=ny;
    inner.querySelector('img').style.objectPosition=`${nx.toFixed(1)}% ${ny.toFixed(1)}%`;
  },{passive:false});
  inner.addEventListener('touchend',()=>{ drag=null; });
}

/* ══ 이미지 줌 ══ */
function zoomImg(src){
  const bg = document.createElement('div');
  bg.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
  const img = document.createElement('img');
  img.src = src;
  img.style.cssText='max-width:95vw;max-height:95vh;border-radius:8px;';
  bg.appendChild(img);
  bg.onclick=()=>bg.remove();
  document.body.appendChild(bg);
}

/* ══ 필터 ══ */
function navFilter(mode, btn){
  currentCategory = mode;
  document.querySelectorAll('.nav-cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const titles = {'':'전체 로그', 'starred':'⭐ 즐겨찾기'};
  document.getElementById('main-title').textContent = titles[mode] !== undefined ? titles[mode] : mode;
  showList();
}

/* ══ 테마 이미지 핸들 ══ */
function handleThemeImg(input){
  const file = input.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e => {
    themeImgData = e.target.result;
    const wrap = document.getElementById('theme-img-preview');
    wrap.style.display = 'block';
    wrap.innerHTML = `<img src="${themeImgData}">
      <button class="theme-img-remove" onclick="removeThemeImg()">×</button>`;
  };
  r.readAsDataURL(file);
}
function removeThemeImg(){
  themeImgData = '';
  const wrap = document.getElementById('theme-img-preview');
  wrap.style.display = 'none';
  wrap.innerHTML = '';
  document.getElementById('theme-img-file').value = '';
}

/* ══ 턴 에디터 ══ */
function addTurnEditor(body='', html='', imgData='', imgPos='bottom', imgSize='original'){
  const c = document.getElementById('turns-editor');
  if(c.querySelectorAll('.turn-editor').length >= 10){ showToast('최대 10개'); return; }
  const idx = c.querySelectorAll('.turn-editor').length;
  const div = document.createElement('div');
  div.className = 'turn-editor';
  div.dataset.turn = idx;
  div.innerHTML = `
    <div class="turn-editor-hd">
      <span class="turn-editor-lbl">블록 ${idx+1}</span>
      <button class="turn-editor-del" onclick="removeTurnEditor(this)">×</button>
    </div>
    <div class="turn-editor-body">
      <textarea class="lw-ta" rows="6" placeholder="본문 · *서술* **굵게** &quot;대사&quot;">${escH(body)}</textarea>
      <div style="margin-top:8px;">
        <div class="lw-label" style="margin-bottom:4px;">📊 HTML 위젯 <span style="font-weight:400;text-transform:none;letter-spacing:0;">(선택)</span></div>
        <textarea class="lw-ta mono" rows="3" placeholder="<div>...</div>">${escH(html)}</textarea>
      </div>
      <div style="margin-top:8px;">
        <div class="lw-label" style="margin-bottom:4px;">🖼️ 이미지 <span style="font-weight:400;text-transform:none;letter-spacing:0;">(선택)</span></div>
        <div class="img-ed-area">
          ${imgData ? `<div class="img-prev-wrap"><img src="${imgData}"><button class="img-rm-btn" onclick="rmTurnImg(this)">×</button></div>` : ''}
          <input type="file" accept="image/*" hidden onchange="handleTurnImg(this)">
          <button class="img-up-btn" onclick="this.previousElementSibling.click()">🖼️ 이미지 선택</button>
        </div>
        <div class="lw-label" style="margin-bottom:4px;margin-top:8px;">이미지 위치</div>
        <div class="img-pos-row">
          <button class="img-pos-btn ${imgPos==='top'?'active':''}" onclick="setImgPos(this,'top')">⬆ 본문 위</button>
          <button class="img-pos-btn ${imgPos==='bottom'?'active':''}" onclick="setImgPos(this,'bottom')">⬇ 본문 아래</button>
        </div>
        <div class="lw-label" style="margin-bottom:4px;margin-top:8px;">이미지 크기</div>
        <div class="img-pos-row">
          <button class="img-size-btn ${(imgSize||'original')==='small'?'active':''}" data-sz="small" onclick="setImgSize(this)">소</button>
          <button class="img-size-btn ${(imgSize||'original')==='medium'?'active':''}" data-sz="medium" onclick="setImgSize(this)">중</button>
          <button class="img-size-btn ${(imgSize||'original')==='original'?'active':''}" data-sz="original" onclick="setImgSize(this)">원본</button>
        </div>
      </div>
    </div>`;
  c.appendChild(div);
  updateTurnLabels();
  updateAddBtn();
}

function setImgPos(btn, pos){
  const row = btn.closest('.img-pos-row');
  row.querySelectorAll('.img-pos-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function setImgSize(btn){
  const row = btn.closest('.img-pos-row');
  row.querySelectorAll('.img-size-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function removeTurnEditor(btn){
  const c = document.getElementById('turns-editor');
  if(c.querySelectorAll('.turn-editor').length <= 1){ showToast('최소 1개'); return; }
  btn.closest('.turn-editor').remove();
  updateTurnLabels(); updateAddBtn();
}
function updateTurnLabels(){
  document.querySelectorAll('.turn-editor').forEach((el,i)=>{
    el.dataset.turn=i;
    el.querySelector('.turn-editor-lbl').textContent=`블록 ${i+1}`;
  });
}
function updateAddBtn(){
  const n = document.querySelectorAll('.turn-editor').length;
  document.getElementById('add-turn-btn').style.display = n>=10?'none':'';
}
function handleTurnImg(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    const area=input.closest('.img-ed-area');
    let prev=area.querySelector('.img-prev-wrap');
    if(!prev){ prev=document.createElement('div'); prev.className='img-prev-wrap'; area.insertBefore(prev,input); }
    prev.innerHTML=`<img src="${e.target.result}"><button class="img-rm-btn" onclick="rmTurnImg(this)">×</button>`;
  };
  r.readAsDataURL(file);
}
function rmTurnImg(btn){ btn.closest('.img-prev-wrap').remove(); }

function getTurns(){
  return [...document.querySelectorAll('.turn-editor')].map(el=>{
    const tas=el.querySelectorAll('textarea');
    const imgEl=el.querySelector('.img-ed-area img');
    const posActive=el.querySelector('.img-pos-btn.active');
    const imgPos = posActive ? (posActive.textContent.includes('위') ? 'top' : 'bottom') : 'bottom';
    const imgSize = el.querySelector('.img-size-btn.active');
    const sz = imgSize ? imgSize.dataset.sz : 'original';
    return {body:tas[0].value, html:tas[1].value.trim(), img:imgEl?imgEl.src:'', imgPos:imgPos, imgSize:sz};
  });
}

function openNewLog(){
  editingId=null; themeImgData='';
  document.getElementById('log-modal-title').textContent='📝 새 로그 작성';
  document.getElementById('lw-title').value='';
  document.getElementById('lw-star').checked=false;
  document.getElementById('lw-category').value = currentCategory && currentCategory !== 'starred' ? currentCategory : '';
  removeThemeImg();
  document.getElementById('turns-editor').innerHTML='';
  addTurnEditor();
  renderCatSelect();
  document.getElementById('log-modal').classList.add('show');
}
function editLog(id){
  const log=logs.find(l=>l.id===id); if(!log) return;
  editingId=id; themeImgData=log.themeImg||'';
  document.getElementById('log-modal-title').textContent='✏️ 로그 수정';
  document.getElementById('lw-title').value=log.title||'';
  document.getElementById('lw-category').value=log.category||'';
  document.getElementById('lw-star').checked=!!log.starred;
  // 테마 이미지
  if(themeImgData){
    const wrap=document.getElementById('theme-img-preview');
    wrap.style.display='block';
    wrap.innerHTML=`<img src="${themeImgData}"><button class="theme-img-remove" onclick="removeThemeImg()">×</button>`;
  } else { removeThemeImg(); }
  document.getElementById('turns-editor').innerHTML='';
  const turns=log.turns&&log.turns.length?log.turns:[{body:'',html:'',img:'',imgPos:'bottom'}];
  turns.forEach(t=>addTurnEditor(t.body||'',t.html||'',t.img||'',t.imgPos||'bottom',t.imgSize||'original'));
  document.getElementById('log-modal').classList.add('show');
}
function closeLogModal(){ document.getElementById('log-modal').classList.remove('show'); }

function saveLog(){
  const log={
    id: editingId||Date.now(),
    title: document.getElementById('lw-title').value.trim(),
    starred: document.getElementById('lw-star').checked,
    category: document.getElementById('lw-category').value,
    themeImg: themeImgData,
    turns: getTurns(),
  };
  if(editingId){ const i=logs.findIndex(l=>l.id===editingId); if(i>=0) logs[i]=log; }
  else logs.unshift(log);
  saveLogs(); closeLogModal();
  if(editingId){
    // 수정: 상세 뷰 또는 목록 어디서 수정했든 바로 상세 뷰로
    showDetail(log.id);
  } else {
    // 새 로그: 작성 후 바로 해당 상세 뷰로
    showDetail(log.id);
  }
  showToast(editingId?'수정 완료!':'저장 완료!');
}

function editCurrentLog(){ if(currentDetailId) editLog(currentDetailId); }
function deleteCurrentLog(){ if(currentDetailId) deleteLog(currentDetailId); }
function deleteLog(id){
  if(!confirm('이 로그를 삭제할까요?')) return;
  logs=logs.filter(l=>l.id!==id); saveLogs(); showList(); showToast('삭제했습니다.');
}

function saveTurnImg(idx){
  const el=document.getElementById('tc-'+idx); if(!el) return;
  const log=logs.find(l=>l.id===currentDetailId);
  const t=(log&&log.title?log.title:'log').replace(/\s+/g,'_').slice(0,14);
  // 오프스크린 클론으로 고정폭 캡처
  const wrap=document.createElement('div');
  wrap.style.cssText="position:fixed;left:-9999px;top:0;width:720px;background:#fffefb;padding:20px;z-index:-1;font-family:'Noto Sans KR',sans-serif;";
  const clone=el.cloneNode(true);
  clone.querySelectorAll('button').forEach(b=>b.remove());
  wrap.appendChild(clone);
  document.body.appendChild(wrap);
  html2canvas(wrap,{scale:2,useCORS:true,allowTaint:true,backgroundColor:'#fffefb',width:720,windowWidth:720}).then(cvs=>{
    document.body.removeChild(wrap);
    const a=document.createElement('a'); a.download=`${t}_${idx+1}.png`; a.href=cvs.toDataURL('image/png'); a.click();
  }).catch(()=>{ try{document.body.removeChild(wrap);}catch(e){} });
}
function buildCaptureWrap(widthPx){
  const el=document.getElementById('detail-turns');
  const ban=document.getElementById('detail-banner');
  const wrap=document.createElement('div');
  wrap.style.cssText=`position:fixed;left:-9999px;top:0;width:${widthPx}px;background:#faf8f4;padding:0;z-index:-1;font-family:'Noto Sans KR',sans-serif;`;
  if(ban && ban.innerHTML){
    const bc=ban.cloneNode(true);
    // 배너 높이 고정
    const bi=bc.querySelector('.theme-banner-inner');
    if(bi) bi.style.height='240px';

  }
  const tc=el.cloneNode(true);
  // 캡처용 패딩
  tc.style.padding='20px';
  wrap.appendChild(tc);
  wrap.querySelectorAll('button').forEach(b=>b.remove());
  document.body.appendChild(wrap);
  return wrap;
}

/* ══ 백업 ══ */
function exportJSON(){
  const b=new Blob([JSON.stringify(logs,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download=`logboard_${new Date().toISOString().slice(0,10)}.json`; a.click();
  showToast('JSON 내보내기 완료');
}
function exportHTML(){
  const ts=new Date().toISOString().slice(0,10);
  const body=logs.map(log=>{
    const title=log.title||new Date(log.id).toLocaleString('ko-KR');
    const banner=log.themeImg?`<div style="width:100%;height:200px;overflow:hidden;border-radius:8px;margin-bottom:16px;"><img src="${log.themeImg}" style="width:100%;height:100%;object-fit:cover;"></div>`:'';
    const turns=(log.turns||[]).map(t=>{
      const b=t.body?`<div style="font-family:'Noto Serif KR',serif;font-size:13.5px;line-height:2.05;white-space:pre-wrap;word-break:keep-all;">${t.body}</div>`:'';
      const w=t.html?`<div style="margin-top:12px;">${t.html}</div>`:'';
      const img=t.img?`<div style="margin-top:12px;"><img src="${t.img}" style="max-width:100%;border-radius:8px;"></div>`:'';
      return `<div style="background:#fffefb;border:1px solid #e8dfd0;border-radius:10px;padding:18px 20px;margin-bottom:12px;">${b}${w}${img}</div>`;
    }).join('');
    return `<div style="margin-bottom:48px;border-top:2px solid #e8dfd0;padding-top:20px;"><h2 style="font-family:'Noto Serif KR',serif;font-size:18px;font-weight:500;margin-bottom:14px;">${escH(title)}</h2>${banner}${turns}</div>`;
  }).join('');
  const html=`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>로그 백업 ${ts}</title><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet"><style>body{font-family:'Noto Sans KR',sans-serif;background:#faf8f4;color:#2d2416;padding:40px 20px;max-width:800px;margin:0 auto;}h1{font-family:'Noto Serif KR',serif;font-size:22px;margin-bottom:32px;color:#4a3320;}</style></head><body><h1>📖 로그 백업 — ${ts}</h1>${body}</body></html>`;
  const b=new Blob([html],{type:'text/html'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download=`logboard_${ts}.html`; a.click();
  showToast('HTML 내보내기 완료');
}
function importJSON(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const imp=JSON.parse(e.target.result);
      if(!Array.isArray(imp)) throw 0;
      const mig=imp.map(log=>{ if(!log.turns) log.turns=[{body:log.body||'',html:log.html||'',img:log.img||'',imgPos:'bottom'}]; return log; });
      if(confirm(`${mig.length}개 불러올까요? 기존 데이터에 추가됩니다.`)){
        logs=[...mig,...logs]; saveLogs(); showList(); showToast(`${mig.length}개 불러왔습니다.`);
      }
    }catch(e){ alert('올바른 JSON이 아닙니다.'); }
  };
  r.readAsText(file); input.value='';
}

function openEditorModal(){
  document.getElementById('editor-modal').classList.add('show');
  if(!editorInjected){ injectEditor(); editorInjected=true; }
}
function closeEditorModalAndReset(){
  document.getElementById('editor-modal').classList.remove('show');
  // 메모리 절약: 닫을 때 iframe 제거, 다음 열 때 재생성
  document.getElementById('editor-iframe-wrap').innerHTML='';
  editorInjected=false;
}
function closeEditorModal(){ closeEditorModalAndReset(); }
function injectEditor(){
  const wrap=document.getElementById('editor-iframe-wrap');
  wrap.innerHTML='';
  const iframe=document.createElement('iframe');
  iframe.style.cssText='width:100%;height:100%;min-height:640px;border:none;display:block;';
  wrap.appendChild(iframe);
  // document.write 방식 — file:// 프로토콜에서도 동작, blob/srcdoc 제한 없음
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write(getEditorHTML());
  doc.close();
}

function renderNavCats(){
  const cats = loadCats();
  const container = document.getElementById('nav-cats');
  container.innerHTML = cats.map(cat =>
    `<button class="nav-cat-btn nav-btn ${currentCategory===cat.name?'active':''}" onclick="navFilter(${JSON.stringify(cat.name)},this)">
      <span class="nav-icon">${cat.icon||'🏷️'}</span>${escH(cat.name)}
    </button>`
  ).join('');
}
function renderCatList(){
  const cats = loadCats();
  const el = document.getElementById('cat-list');
  if(!cats.length){ el.innerHTML='<div style="color:var(--text3);text-align:center;padding:20px;font-size:12px;">분류가 없습니다.</div>'; return; }
  el.innerHTML = cats.map((cat,i) =>
    `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:7px;margin-bottom:6px;background:var(--surface);">
      <span style="font-size:18px;width:28px;text-align:center;">${cat.icon||'🏷️'}</span>
      <span style="flex:1;font-size:13px;">${escH(cat.name)}</span>
      <button onclick="deleteCat(${i})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 4px;" title="삭제">×</button>
    </div>`
  ).join('');
}
function renderCatSelect(){
  const cats = loadCats();
  const sel = document.getElementById('lw-category');
  const cur = sel ? sel.value : '';
  sel.innerHTML = '<option value="">-- 분류 없음 --</option>' + cats.map(cat=>`<option value="${escH(cat.name)}" ${cur===cat.name?'selected':''}>${cat.icon||'🏷️'} ${escH(cat.name)}</option>`).join('');
}
function openCatModal(){
  document.getElementById('cat-modal').classList.add('show');
  renderCatList();
}
function closeCatModal(){
  document.getElementById('cat-modal').classList.remove('show');
  renderNavCats(); renderCatSelect();
}
function addCat(){
  const nameInput = document.getElementById('cat-input');
  const iconInput = document.getElementById('cat-icon-input');
  const name = nameInput.value.trim(); if(!name) return;
  const icon = iconInput.value.trim() || '🏷️';
  const cats = loadCats();
  if(cats.some(c=>c.name===name)){ showToast('이미 있는 분류예요.'); return; }
  cats.push({name, icon}); saveCats(cats);
  nameInput.value=''; iconInput.value=''; renderCatList();
}
function deleteCat(idx){
  const cats = loadCats(); cats.splice(idx,1); saveCats(cats);
  renderCatList();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

document.getElementById('log-modal').addEventListener('click',e=>{ if(e.target===document.getElementById('log-modal')) closeLogModal(); });
document.getElementById('cat-modal').addEventListener('click',e=>{ if(e.target===document.getElementById('cat-modal')) closeCatModal(); });
document.getElementById('editor-modal').addEventListener('click',e=>{ if(e.target===document.getElementById('editor-modal')) closeEditorModalAndReset(); });

loadLogs(); renderNavCats(); renderCatSelect();
showList();

function gPat(k){const m={'lined-cream':{c:'#faf6ee',i:'linear-gradient(to bottom,transparent calc(100% - 1px),#c8b89a 100%)',s:'100% 28px'}};return m[k]||{c:'#1a1a1a',i:'',s:''};}
function gFn(){const txt=document.getElementById('i-t').value.replace(/["""\u201C\u201D]/g,'').replace(/[\s\n]+/g,'_').replace(/[^\w\uAC00-\uD7A3_]/g,'').slice(0,20);const n=new Date();return(txt||'quote')+'_'+n.getFullYear()+String(n.getMonth()+1).padStart(2,'0')+String(n.getDate()).padStart(2,'0')+'_'+String(n.getHours()).padStart(2,'0')+String(n.getMinutes()).padStart(2,'0')+'.png';}
function save(){const isA5=card.classList.contains('size-a5'),isXL=card.classList.contains('size-xl'),isL=card.classList.contains('size-l'),isH=card.classList.contains('r-3-1');let sc=2;if(isA5)sc=1748/595;else if(isH){if(isXL)sc=1500/900;else if(isL)sc=2;else sc=2.5;}const st=card.style.transform,sm=card.style.margin;card.style.transform='';card.style.margin='';const ec=getComputedStyle(document.documentElement).getPropertyValue('--em-color').trim(),ecd=getComputedStyle(document.documentElement).getPropertyValue('--em-color-dark').trim(),sc2=getComputedStyle(document.documentElement).getPropertyValue('--st-color').trim(),scd=getComputedStyle(document.documentElement).getPropertyValue('--st-color-dark').trim(),dk=card.classList.contains('text-dark'),qs=card.querySelectorAll('.quoted'),ss=card.querySelectorAll('.starred');qs.forEach(el=>{if(card.classList.contains('em-color')||card.classList.contains('em-both'))el.style.color=dk?ecd:ec;if(card.classList.contains('em-bold')||card.classList.contains('em-both'))el.style.fontWeight='700';});ss.forEach(el=>{if(card.classList.contains('st-color')||card.classList.contains('st-italic-color'))el.style.color=dk?scd:sc2;if(card.classList.contains('st-italic')||card.classList.contains('st-italic-color')||card.classList.contains('st-dim'))el.style.fontStyle='italic';if(card.classList.contains('st-dim'))el.style.opacity='.7';});let pai=false;PAT.forEach(pc=>{if(card.classList.contains(pc)){const pk=pc.replace('card-pat-',''),ps=gPat(pk);card.classList.remove(pc);card.style.backgroundColor=ps.c;card.style.backgroundImage=ps.i;card.style.backgroundSize=ps.s;pai=pc;}});const restore=()=>{qs.forEach(el=>{el.style.color='';el.style.fontWeight='';});ss.forEach(el=>{el.style.color='';el.style.fontStyle='';el.style.opacity='';});if(pai){card.style.backgroundColor='';card.style.backgroundImage='';card.style.backgroundSize='';card.classList.add(pai);}card.style.transform=st;card.style.margin=sm;fitCard();};html2canvas(card,{scale:sc,useCORS:true,allowTaint:true,backgroundColor:null}).then(cvs=>{restore();const a=document.createElement('a');a.download=gFn();a.href=cvs.toDataURL('image/png');a.click();}).catch(e=>restore());}

function fitCard(){if(window.innerWidth>768){card.style.transform='';card.style.margin='';return;}const p=document.querySelector('.preview');if(!p)return;card.style.transform='';card.style.margin='';const aw=p.clientWidth-24,ah=p.clientHeight-24,cw=card.offsetWidth,ch=card.offsetHeight;if(!cw||!ch)return;const sc=Math.min(aw/cw,ah/ch,1);if(sc<1){card.style.transform='scale('+sc+')';card.style.margin=-(ch*(1-sc))/2+'px '+(-(cw*(1-sc))/2)+'px';}}
let imgDS=null;

function onMD(e){if(!lastImgData)return;e.preventDefault();const p=parseBP();imgDS={sx:e.clientX,sy:e.clientY,px:p.x,py:p.y};tplDH.style.cursor='grabbing';document.addEventListener('mousemove',onMM);document.addEventListener('mouseup',onMU);}
function onMM(e){if(!imgDS)return;const dx=e.clientX-imgDS.sx,dy=e.clientY-imgDS.sy,cw=card.offsetWidth,ch=card.offsetHeight,nx=Math.max(0,Math.min(100,imgDS.px-(dx/cw*100))),ny=Math.max(0,Math.min(100,imgDS.py-(dy/ch*100)));tplCover.style.backgroundPosition=nx.toFixed(1)+'% '+ny.toFixed(1)+'%';}

function onTS(e){if(!lastImgData)return;e.preventDefault();const t=e.touches[0],p=parseBP();imgDS={sx:t.clientX,sy:t.clientY,px:p.x,py:p.y};document.addEventListener('touchmove',onTM,{passive:false});document.addEventListener('touchend',onTE);}
function onTM(e){if(!imgDS)return;e.preventDefault();const t=e.touches[0],dx=t.clientX-imgDS.sx,dy=t.clientY-imgDS.sy,cw=card.offsetWidth,ch=card.offsetHeight,nx=Math.max(0,Math.min(100,imgDS.px-(dx/cw*100))),ny=Math.max(0,Math.min(100,imgDS.py-(dy/ch*100)));tplCover.style.backgroundPosition=nx.toFixed(1)+'% '+ny.toFixed(1)+'%';}
